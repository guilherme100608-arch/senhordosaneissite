<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" method="" autocomplete="off">
        
        <label for="nomepessoa">Nome</label>
        <input type="text" name="nome" id="nome" 
        placeholder="informe seu nome" required><br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email"
        required><br><br>

        <label for="ano">Ano de nascimento</label>
        <input type="number" name="ano" max="2026" min="1900" 
        placeholder="informe ano de nascimento" required><br><br>

        <label for="telefone">telefone</label>
        <input type="tel" name="telefone" id="telefone" 
        placeholder="informe seu telefone" required><br><br>

        <label for="github">GitHub</label>
        <input type="url" name="github" id="github" 
        placeholder="informe seu github" required><br><br>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" 
        placeholder="informe sua senha" required><br><br>

        <label for="arquivo">Arquivo</label>
        <input type="file" name="arquivo" id="arquivo" 
        placeholder="Envie um arquivo" required><br><br>

        <label for="cor">Cor</label>
        <input type="color" name="cor" id="cor" 
        placeholder="escolha uma cor" required><br><br>

        <label for="data">Informe a Data</label>
        <input type="date" name="data" id="data" 
        required><br><br>

        <label for="pesquisa">Pesquisa</label>
        <input type="search" name="pesquisa" id="pesquisa" 
        ><br><br>

        <label for="nivel">Escolha o nivel</label>
        <input type="range" max="10" min="1" id="nivel" name="nivel">

        <select id="lista suspensa" name="lista">
            <optgroup label="teste legenda combobox">
                <option value="teste1">teste1</option>
                <option value="teste2">teste2</option>
                <option value="teste3">teste3</option>
            </optgroup>

            <optgroup label="teste legenda combobox 2">
                <option value="teste4">teste4</option>
                <option value="teste5">teste5</option>
                <option value="teste6">teste6</option>
            </optgroup>
        </select>

        <fieldset>
            <legend> desenvolvimento para internet</legend>
            <label><input type="checkbox" name="php" value="php">PHP</label>
            <label><input type="checkbox" name="html5" value="html5">html5</label>
            <label><input type="checkbox" name="css" value="css">CSS</label>
            <label><input type="checkbox" name="js" value="js">Js</label>
        </fieldset>

        <!-- Datalist possives ganhadores da copo do mundo 2026-->
        <input type="text" id="busca_datalist" list="paises">
        <datalist id="paises">
            <option>Brasil</option>
            <option>França</option>
            <option>Argentina</option>
            <option>Alemanha</option>
            <option>Inglaterra</option>
            <option>Espanha</option>
        </datalist>
        
        <audio controls>
            <source src="audio/musica.mp3" type="audio/mp3">
            Navegador não suportado pelo player online.
        </audio>

        <video controls autoplay loop>
            <source src="video/videoteste.mp4" type="video/mp4">
            Navegador não suportado pelo player online.
        </video>

        <iframe width="560" height="315" 
        src="https://www.youtube.com/embed/E4WlUXrJgy4?si=jtZ85fl9fpu30zVh" 
        title="YouTube video player" frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; 
        encrypted-media; gyroscope; picture-in-picture; 
        web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen></iframe>

        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d57881.32824997031!2d-53.49797614251575!3d-24.946271319180067!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94f3d15547bda185%3A0xd0cbc7fb7cc4a1a6!2sUNIPAR%20-%20Universidade%20Paranaense%20-%20Cascavel!5e0!3m2!1spt-BR!2sbr!4v1774297149904!5m2!1spt-BR!2sbr" 
        width="600" height="450" style="border:0;" 
        allowfullscreen="" loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade"></iframe>

        <button type="submit">Enviar</button>

        </form>
</body>
</html>
