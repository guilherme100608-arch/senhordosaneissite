<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" method="" autocomplete="off">
        
        <label for="nomepessoa">Nome</label>
        <input type="text" name="nome" id="nome" 
        placeholder="informe seu nome" required><br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email"
        required><br><br>

        <label for="ano">Ano de nascimento</label>
        <input type="number" name="ano" max="2026" min="1900" 
        placeholder="informe ano de nascimento" required><br><br>

        <label for="telefone">telefone</label>
        <input type="tel" name="telefone" id="telefone" 
        placeholder="informe seu telefone" required><br><br>

        <label for="github">GitHub</label>
        <input type="url" name="github" id="github" 
        placeholder="informe seu github" required><br><br>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" 
        placeholder="informe sua senha" required><br><br>

        <label for="arquivo">Arquivo</label>
        <input type="file" name="arquivo" id="arquivo" 
        placeholder="Envie um arquivo" required><br><br>

        <label for="cor">Cor</label>
        <input type="color" name="cor" id="cor" 
        placeholder="escolha uma cor" required><br><br>

        <label for="data">Informe a Data</label>
        <input type="date" name="data" id="data" 
        required><br><br>

        <label for="pesquisa">Pesquisa</label>
        <input type="search" name="pesquisa" id="pesquisa" 
        ><br><br>

        <button type="submit">Enviar</button>

        </form>
</body>
</html>
