        <h1 class="titulo_secundario">Contato com a Terra Média</h1>
        <p>Envie sua mensagem diretamente para o conselho de Elrond</p>

        <form action="" method="" autocomplete="off">
            <label for="nomepessoa">Nome na Terra Média</label>
            <input type="text" name="nome" id="nome" 
            placeholder="Ex: Aragorn" required><br><br>

            <label for="email">Corvo Analógico:</label>
            <input type="email" name="email" id="email"
            required><br><br>

            <label for="ano">Ano de nascimento</label>
            <input type="number" name="ano" max="3019" min="2919" 
            placeholder="informe ano de nascimento" required><br><br>

            <fieldset>
            <legend>Qual é a sua raça?</legend>
            <label><input type="checkbox" name="humano" value="humano">Humano</label>
            <label><input type="checkbox" name="elfo" value="elfo">Elfo</label>
            <label><input type="checkbox" name="anão" value="anão">Anão</label>
            <label><input type="checkbox" name="hobbit" value="hobbit">Hobbit</label>
        </fieldset>

        </form>
